name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'xdr6088'
        type: choice
        options: [xdr6088, ax6000]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  DEVICE: ${{ github.event.inputs.device }}
  WORK_DIR: ${{ github.workspace }}/openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 更新包管理器
        sudo apt-get update
        
        # 安装基础依赖
        sudo apt-get install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          rsync \
          swig \
          unzip \
          zlib1g-dev \
          file \
          wget \
          make \
          ccache \
          libz-dev \
          libstdc++6 \
          xsltproc

    - name: Maximize Disk Space
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    - name: Clone LEDE Source
      run: |
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        echo "COMPILE_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: Apply Configuration
      run: |
        cd ${{ env.WORK_DIR }}
        
        # 复制配置文件
        CONFIG_FILE="${{ github.workspace }}/config/${{ env.DEVICE }}-full.config"
        echo "📋 应用配置: $CONFIG_FILE"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 错误：找不到配置文件"
          ls -la "${{ github.workspace }}/config/" || echo "目录不存在"
          exit 1
        fi
        
        cp -f "$CONFIG_FILE" .config
        
        # 修复 vsftpd 冲突
        echo "🔧 修复配置冲突..."
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 生成配置
        make defconfig

    - name: Download Packages
      run: |
        cd ${{ env.WORK_DIR }}
        make download -j$(nproc)

    - name: Compile Firmware
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}
        mkdir -p ${{ github.workspace }}/output
        
        START_TIME=$(date +%s)
        
        # 编译
        if make -j$(nproc) V=s 2>&1 | tee ${{ github.workspace }}/output/build.log; then
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "✅ 编译成功！耗时: $((DURATION/3600))h $((DURATION%3600/60))m $((DURATION%60))s"
          
          # 查找固件
          FIRMWARE=$(find bin/targets -name "*sysupgrade.bin" -type f | head -1)
          if [ -n "$FIRMWARE" ]; then
            echo "📦 固件: $FIRMWARE"
            cp "$FIRMWARE" ${{ github.workspace }}/output/
            echo "FIRMWARE_NAME=$(basename $FIRMWARE)" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到固件"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "❌ 编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Upload Firmware
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        tag: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ github.workspace }}/output/*.bin
          ${{ github.workspace }}/output/build.log
        body: |
          ### 📒 编译信息
          - **设备**: ${{ env.DEVICE }}
          - **编译时间**: ${{ env.COMPILE_DATE }}
          - **固件**: ${{ env.FIRMWARE_NAME }}

    - name: Upload Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.DEVICE }}
        path: |
          ${{ github.workspace }}/output/build.log
          ${{ env.WORK_DIR }}/.config
