name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'ax6000'
        type: choice
        options: [ax6000, xdr6088]
      config_version:
        description: '📦 配置版本'
        required: true
        default: 'test'
        type: choice
        options: [full, mini, test]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  DEVICE: ${{ github.event.inputs.device }}
  CONFIG_VERSION: ${{ github.event.inputs.config_version }}
  WORK_DIR: ${{ github.workspace }}/openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    # 🔍 步骤 1: 检出仓库（关键！）
    - name: 🔍 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # 确保检出到正确位置
        path: '.'
      
    # 🔍 步骤 2: 调试 - 显示目录结构
    - name: 🔍 Debug: Show Directory Structure
      run: |
        echo "📁 GitHub Workspace: ${{ github.workspace }}"
        echo "📁 Current Directory: $(pwd)"
        echo ""
        echo "📋 Repository Root Contents:"
        ls -la "${{ github.workspace }}/"
        echo ""
        echo "📋 Config Directory Contents:"
        if [ -d "${{ github.workspace }}/config" ]; then
          ls -la "${{ github.workspace }}/config/"
        else
          echo "❌ config directory NOT found!"
          echo "🔍 Searching for .config files:"
          find "${{ github.workspace }}" -name "*.config" -type f 2>/dev/null || true
        fi

    # 🛠️ 步骤 3: 初始化编译环境
    - name: 🛠️ Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-setuptools \
          rsync swig unzip zlib1g-dev file wget make ccache libz-dev \
          libstdc++6 xsltproc dos2unix libfuse-dev
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'

    # 💾 步骤 4: 最大化磁盘空间
    - name: 💾 Maximize Disk Space
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    # 📥 步骤 5: 克隆 LEDE 源码
    - name: 📥 Clone Source
      run: |
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        echo "COMPILE_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    # ⚙️ 步骤 6: 应用配置
    - name: ⚙️ Apply Configuration
      run: |
        cd ${{ env.WORK_DIR }}
        
        # 使用绝对路径
        CONFIG_FILE="${{ github.workspace }}/config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        echo "📋 Looking for config: $CONFIG_FILE"
        
        # 检查文件是否存在
        if [ -f "$CONFIG_FILE" ]; then
          echo "✅ Found config file!"
          cp -f "$CONFIG_FILE" .config
          echo "📋 Copied to: $(pwd)/.config"
        else
          echo "❌ Config file not found: $CONFIG_FILE"
          echo "🔍 Available files in config directory:"
          ls -la "${{ github.workspace }}/config/" 2>/dev/null || echo "Directory not found"
          exit 1
        fi
        
        # 修复冲突
        echo "🔧 Fixing conflicts..."
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig

    # 📥 步骤 7: 下载软件包
    - name: 📥 Download Packages
      run: |
        cd ${{ env.WORK_DIR }}
        make download -j$(nproc)

    # 🏗️ 步骤 8: 编译固件
    - name: 🏗️ Compile Firmware
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}
        mkdir -p ${{ github.workspace }}/output
        
        START_TIME=$(date +%s)
        
        if make -j$(nproc) V=s 2>&1 | tee ${{ github.workspace }}/output/build.log; then
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "✅ Build successful! Time: $((DURATION/3600))h $((DURATION%3600/60))m $((DURATION%60))s"
          
          FIRMWARE=$(find bin/targets -name "*sysupgrade.bin" -type f | head -1)
          if [ -n "$FIRMWARE" ]; then
            cp "$FIRMWARE" ${{ github.workspace }}/output/
            echo "FIRMWARE_NAME=$(basename $FIRMWARE)" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ No firmware found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "❌ Build failed"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    # 🚀 步骤 9: 发布固件
    - name: 🚀 Release Firmware
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        tag: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ github.workspace }}/output/*.bin
          ${{ github.workspace }}/output/build.log
        body: |
          ### 📒 Build Info
          - **Device**: ${{ env.DEVICE }}
          - **Config**: ${{ env.CONFIG_VERSION }}
          - **Date**: ${{ env.COMPILE_DATE }}
