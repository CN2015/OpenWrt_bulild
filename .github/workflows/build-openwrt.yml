# ============================================================================
# OpenWrt LEDE 自动化编译系统 v3.8.17 (精简修复版)
# 核心修复：✅ 简化流程 ✅ 精准路径 ✅ 彻底解决 vsftpd 冲突
# ============================================================================

name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'ax6000'
        type: choice
        options: [xdr6088, ax6000]
      config_version:
        description: '📦 配置版本'
        required: true
        default: 'full'
        type: choice
        options: [full]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  DEVICE: ${{ github.event.inputs.device }}
  CONFIG_VERSION: ${{ github.event.inputs.config_version }}
  WORK_DIR: ${{ github.workspace }}/openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update
        sudo apt install -y $(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh | grep "apt install" | sed 's/sudo apt install -y //')
        sudo apt install -y dos2unix libfuse-dev
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'

    - name: Maximize Disk Space
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    - name: Clone LEDE Source
      run: |
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        echo "COMPILE_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: Apply Configuration
      run: |
        cd ${{ env.WORK_DIR }}
        
        # 检查配置文件是否存在
        CONFIG_FILE="${{ github.workspace }}/config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        echo "📋 配置文件路径: $CONFIG_FILE"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 错误：配置文件不存在"
          echo "📁 当前目录结构:"
          ls -la "${{ github.workspace }}/"
          ls -la "${{ github.workspace }}/config/" 2>/dev/null || echo "config 目录不存在"
          exit 1
        fi
        
        # 复制配置
        cp -f "$CONFIG_FILE" .config
        
        # 🔧 强制禁用冲突包
        echo "🔧 修复配置冲突..."
        
        # 禁用官方 vsftpd（保留 vsftpd-alt）
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        
        # 禁用 luci-app-vsftpd（与 vsftpd-alt 不兼容）
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn=y/# CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn is not set/' .config
        
        # 禁用旧版 firewall（保留 firewall4）
        sed -i 's/^CONFIG_PACKAGE_firewall=y/# CONFIG_PACKAGE_firewall is not set/' .config
        
        # 确保 vsftpd-alt 启用
        if ! grep -q "CONFIG_PACKAGE_vsftpd-alt=y" .config; then
          echo "CONFIG_PACKAGE_vsftpd-alt=y" >> .config
        fi
        
        echo "✅ 配置冲突已修复"
        
        # 显示配置信息
        echo "📊 配置信息:"
        echo "  目标平台: $(grep '^CONFIG_TARGET_BOARD' .config | cut -d'"' -f2)"
        echo "  设备型号: $(grep '^CONFIG_TARGET_PROFILE' .config | cut -d'"' -f2)"
        echo "  插件数量: $(grep -c '^CONFIG_PACKAGE_.*=y' .config)"

    - name: Update Feeds
      run: |
        cd ${{ env.WORK_DIR }}
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Configuration
      run: |
        cd ${{ env.WORK_DIR }}
        make defconfig
        
        # 再次检查并修复 defconfig 可能拉回的冲突包
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        
        make defconfig

    - name: Download Packages
      run: |
        cd ${{ env.WORK_DIR }}
        make download -j$(nproc)

    - name: Compile Firmware
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}
        mkdir -p ${{ github.workspace }}/output
        
        START_TIME=$(date +%s)
        
        # 编译
        if make -j$(nproc) V=s 2>&1 | tee ${{ github.workspace }}/output/build.log; then
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo "✅ 编译成功！耗时: $((DURATION/3600))h $((DURATION%3600/60))m $((DURATION%60))s"
          
          # 查找固件
          FIRMWARE=$(find bin/targets -name "*sysupgrade.bin" -type f | head -1)
          if [ -n "$FIRMWARE" ]; then
            echo "📦 固件文件: $FIRMWARE"
            cp "$FIRMWARE" ${{ github.workspace }}/output/
            echo "FIRMWARE_NAME=$(basename $FIRMWARE)" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到固件文件"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "❌ 编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Upload Firmware
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: OpenWrt-${{ env.DEVICE }}-${{ env.FIRMWARE_TAG || github.run_number }}
        tag: OpenWrt-${{ env.DEVICE }}-${{ env.FIRMWARE_TAG || github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ github.workspace }}/output/*.bin
          ${{ github.workspace }}/output/build.log
        body: |
          ### 📒 编译信息
          - **设备**: ${{ env.DEVICE }}
          - **编译时间**: ${{ env.COMPILE_DATE }}
          - **固件**: ${{ env.FIRMWARE_NAME }}

    - name: Upload Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.DEVICE }}
        path: |
          ${{ github.workspace }}/output/build.log
          ${{ env.WORK_DIR }}/.config
