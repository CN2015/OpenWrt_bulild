# ============================================================================
# OpenWrt 自动化编译系统 - LEDE 专用版（优化版）
# 源码：https://github.com/coolsnowwolf/lede
# 适配：红米 AX6000 / TP-LINK XDR6088
# ============================================================================

name: Build OpenWrt LEDE

# 🌍 全局环境变量
env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_DIR: config
  DIY_P1_SH: diy/diy-part1.sh
  DIY_P2_SH: diy/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

# 🔁 触发条件
on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择设备型号'
        required: true
        default: 'ax6000'
        type: choice
        options:
          - ax6000
          - xdr6088
          - custom
      clean_cache:
        description: '🧹 清理编译缓存'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 💻 编译任务
jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
    
    # 🔍 步骤 1: 检出仓库代码
    - name: 🔍 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 🛠️ 步骤 2: 初始化编译环境
    - name: 🛠️ 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 🧹 清理无用组件释放空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-mark hold grub-efi-amd64-signed
        
        # 🔄 更新 + 升级系统
        sudo -E apt-get -qq update
        sudo -E apt-get -qq full-upgrade
        
        # 📦 安装编译依赖
        sudo -E apt-get -qq install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
          flex gawk gcc-multilib g++-multilib gettext genisoimage git \
          gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev \
          libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
          pkgconf python3 python3-pip python3-setuptools qemu-utils \
          rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        
        # 🗑️ 清理缓存
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        
        # 🕐 设置时区 + 用户配置
        sudo timedatectl set-timezone "$TZ"
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'noreply@github.com'
        
        # 💾 显示磁盘空间
        df -h

    # 📥 步骤 3: 克隆 LEDE 源码（简化路径逻辑）
    - name: 📥 克隆 LEDE 源码
      run: |
        df -hT $GITHUB_WORKSPACE
        git clone $REPO_URL -b $REPO_BRANCH --single-branch openwrt
        
        # 🏷️ 记录编译信息
        echo "BUILD_DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
        echo "BUILD_TIME=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "OPENWRT_PATH=$GITHUB_WORKSPACE/openwrt" >> $GITHUB_ENV

    # 📡 步骤 4: 加载自定义 feeds
    - name: 📡 加载自定义 feeds
      run: |
        chmod +x $DIY_P1_SH
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # 🔄 步骤 5: 更新 feeds 索引
    - name: 🔄 更新 feeds 索引
      run: cd $OPENWRT_PATH && ./scripts/feeds update -a

    # 📦 步骤 6: 安装 feeds 软件包
    - name: 📦 安装 feeds 软件包
      run: cd $OPENWRT_PATH && ./scripts/feeds install -a

    # ⚙️ 步骤 7: 加载设备配置 + 执行 diy-part2.sh
    - name: ⚙️ 加载设备配置
      run: |
        cd $OPENWRT_PATH
        
        # 📋 复制设备配置文件
        DEVICE="${{ github.event.inputs.device || 'ax6000' }}"
        CONFIG_PATH="$GITHUB_WORKSPACE/$CONFIG_DIR/${DEVICE}.config"
        
        if [ -f "$CONFIG_PATH" ]; then
          cp "$CONFIG_PATH" .config
          echo "✅ 已加载配置: $CONFIG_PATH"
        else
          echo "❌ 配置文件不存在: $CONFIG_PATH"
          exit 1
        fi
        
        # 🔧 执行 diy-part2.sh
        if [ -x "$GITHUB_WORKSPACE/$DIY_P2_SH" ]; then
          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          $GITHUB_WORKSPACE/$DIY_P2_SH
        fi

    # 📥 步骤 8: 下载软件包
    - name: 📥 下载软件包
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

    # 🏗️ 步骤 9: 编译固件
    - name: 🏗️ 编译固件
      id: compile
      run: |
        cd $OPENWRT_PATH
        
        echo "🚀 使用 $(nproc) 线程编译"
        
        # 🔨 编译 + 失败降级重试
        make -j$(nproc) V=s 2>&1 | tee "$GITHUB_WORKSPACE/build.log" || \
        make -j1 V=s 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"
        
        # ✅ 标记编译状态
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        # 🏷️ 提取设备名称
        DEVICE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
        [ -n "$DEVICE_NAME" ] && echo "DEVICE_NAME=_$DEVICE_NAME" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # 🗂️ 步骤 10: 整理固件文件
    - name: 🗂️ 整理固件文件
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        # 📍 动态定位固件目录
        FIRMWARE_DIR=$(find $OPENWRT_PATH/bin/targets -type d -name "filogic" -o -name "ramips" -o -name "x86" 2>/dev/null | head -1)
        [ -z "$FIRMWARE_DIR" ] && FIRMWARE_DIR=$(find $OPENWRT_PATH/bin/targets -type d | grep -E "targets/.*/.*$" | head -1)
        
        cd "$FIRMWARE_DIR"
        rm -rf packages
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 📝 生成发布说明
        cat > "$GITHUB_WORKSPACE/release.txt" << EOF
## 📒 固件信息

| 项目 | 值 |
|------|-----|
| 💻 设备 | ${{ github.event.inputs.device || 'ax6000' }} |
| 📂 源码 | [coolsnowwolf/lede]($REPO_URL) |
| 🌳 分支 | $REPO_BRANCH |
| 🕐 编译时间 | ${{ env.BUILD_DATE }} |
| 📦 固件大小 | $(du -h *.bin 2>/dev/null | cut -f1 | head -1) |

## 🔧 默认配置
- 🌐 管理地址: \`192.168.1.1\`
- 👤 用户名: \`root\`
- 🔒 密码: **(首次登录强制修改)**

## ⚠️ 注意事项
1. 首次刷写建议使用 \`sysupgrade -n\` 清空配置
2. 固件校验: \`sha256sum -c *.sha256\`
EOF

    # 📤 步骤 11: 上传固件到 Artifact
    - name: 📤 上传固件到 Artifact
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: OpenWrt_${{ github.event.inputs.device || 'ax6000' }}_${{ env.BUILD_TIME }}
        path: ${{ env.FIRMWARE }}/*.bin
        retention-days: 7

    # 🚀 步骤 12: 发布固件到 GitHub Release
    - name: 🚀 发布固件到 GitHub Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: LEDE-${{ github.event.inputs.device || 'ax6000' }}-${{ env.BUILD_DATE }}
        tag_name: LEDE-${{ github.event.inputs.device || 'ax6000' }}-${{ env.BUILD_TIME }}
        body_path: $GITHUB_WORKSPACE/release.txt
        files: |
          ${{ env.FIRMWARE }}/*.bin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 📝 步骤 13: 上传编译日志（便于排查）
    - name: 📝 上传编译日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.event.inputs.device || 'ax6000' }}-${{ env.BUILD_TIME }}
        path: $GITHUB_WORKSPACE/build.log
        retention-days: 3

    # 🗑️ 步骤 14: 清理旧的工作流记录
    - name: 🗑️ 清理旧的工作流记录
      uses: GitRML/delete-workflow-runs@v1
      with:
        retain_days: 1
        keep_minimum_runs: 3

    # 🗑️ 步骤 15: 清理旧的 Release
    - name: 🗑️ 清理旧的 Release
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
