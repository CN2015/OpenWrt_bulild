# ============================================================================
# OpenWrt 自动化编译系统 - GitHub Actions
# 功能：自动编译 + 智能配置 + 冲突拦截 + 固件发布
# 适配：REDMI AX6000 / TP-LINK XDR6088
# ============================================================================

name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'ax6000'
        type: choice
        options: [ax6000, xdr6088]
      config_version:
        description: '📦 配置版本'
        required: true
        default: 'test'
        type: choice
        options: [full, mini, test]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  DEVICE: ${{ github.event.inputs.device }}
  CONFIG_VERSION: ${{ github.event.inputs.config_version }}
  WORK_DIR: ${{ github.workspace }}/openwrt
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: 🔍 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update
        sudo apt install -y $(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh | grep "apt install" | sed 's/sudo apt install -y //')
        sudo apt install -y dos2unix libfuse-dev
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'

    - name: 💾 最大化磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    - name: 📥 克隆 LEDE 源码
      run: |
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        echo "COMPILE_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: ⚙️ 应用配置并修复冲突
      run: |
        cd ${{ env.WORK_DIR }}
        
        # 复制配置文件
        CONFIG_FILE="${{ github.workspace }}/config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        echo "📋 应用配置: $CONFIG_FILE"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 错误：找不到配置文件"
          ls -la "${{ github.workspace }}/config/" || echo "目录不存在"
          exit 1
        fi
        
        cp -f "$CONFIG_FILE" .config
        
        # 🔧 强制修复冲突包
        echo "🔧 修复配置冲突..."
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn=y/# CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_firewall=y/# CONFIG_PACKAGE_firewall is not set/' .config
        
        # 确保 vsftpd-alt 和 firewall4 启用
        if ! grep -q "CONFIG_PACKAGE_vsftpd-alt=y" .config; then
          echo "CONFIG_PACKAGE_vsftpd-alt=y" >> .config
        fi
        if ! grep -q "CONFIG_PACKAGE_firewall4=y" .config; then
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
        fi
        
        # 设置 WiFi 前缀（根据机型）
        case "${{ env.DEVICE }}" in
          ax6000)
            WIFI_PREFIX="Redmi_"
            echo "📱 Redmi AX6000 - WiFi 前缀: Redmi_"
            ;;
          xdr6088)
            WIFI_PREFIX="TP-LINK_"
            echo "📱 TP-LINK XDR6088 - WiFi 前缀: TP-LINK_"
            ;;
          *)
            WIFI_PREFIX="OpenWrt_"
            echo "📱 未知机型 - WiFi 前缀: OpenWrt_"
            ;;
        esac
        echo "WIFI_PREFIX=$WIFI_PREFIX" >> $GITHUB_ENV
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 生成配置
        make defconfig
        
        echo "✅ 配置应用完成"

    - name: 📥 下载软件包
      run: |
        cd ${{ env.WORK_DIR }}
        make download -j$(nproc)

    - name: 🏗️ 编译固件
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}
        mkdir -p ${{ env.OUTPUT_DIR }}
        
        START_TIME=$(date +%s)
        
        # 编译
        if make -j$(nproc) V=s 2>&1 | tee ${{ env.OUTPUT_DIR }}/build.log; then
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "✅ 编译成功！耗时: $((DURATION/3600))h $((DURATION%3600/60))m $((DURATION%60))s"
          
          # 查找固件
          FIRMWARE=$(find bin/targets -name "*sysupgrade.bin" -type f | head -1)
          if [ -n "$FIRMWARE" ]; then
            cp "$FIRMWARE" ${{ env.OUTPUT_DIR }}/
            echo "FIRMWARE_NAME=$(basename $FIRMWARE)" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到固件"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "❌ 编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: 🚀 发布固件
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        tag: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ env.OUTPUT_DIR }}/*.bin
          ${{ env.OUTPUT_DIR }}/build.log
        body: |
          ### 📒 固件信息
          
          | 项目 | 值 |
          |------|-----|
          | 💻 设备 | ${{ env.DEVICE }} |
          | 📂 源码 | coolsnowwolf/lede |
          | 🌳 分支 | ${{ env.REPO_BRANCH }} |
          | 🕐 编译时间 | ${{ env.COMPILE_DATE }} |
          
          ### 🔧 默认配置
          - 🌐 管理地址: `192.168.1.1`
          - 👤 用户名: `root`
          - 🔒 密码: **首次登录强制修改**
          - 📶 WiFi: 前缀 `${{ env.WIFI_PREFIX }}` + MAC_2G/5G
          - 🎨 主题: Argon
          
          ### ⚠️ 注意事项
          1. 首次刷写建议: `sysupgrade -n firmware.bin`
          2. 固件已包含 Argon 主题
          3. WiFi 名称格式: `${{ env.WIFI_PREFIX }}XXXX_2G/5G`

    - name: 📝 上传日志（失败时）
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.DEVICE }}
        path: |
          ${{ env.OUTPUT_DIR }}/build.log
          ${{ env.WORK_DIR }}/.config
