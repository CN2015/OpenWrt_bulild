# ============================================================================
# OpenWrt 自动化编译系统 - GitHub Actions
# ============================================================================

name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'ax6000'
        type: choice
        options: [ax6000, xdr6088]
      config_version:
        description: '📦 配置版本'
        required: true
        default: 'full'
        type: choice
        options: [full, mini, test]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  DEVICE: ${{ github.event.inputs.device }}
  CONFIG_VERSION: ${{ github.event.inputs.config_version }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: 🔍 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          rsync \
          swig \
          unzip \
          zlib1g-dev \
          file \
          wget \
          make \
          ccache \
          libz-dev \
          libstdc++6 \
          xsltproc \
          dos2unix \
          libfuse-dev
        
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'

    - name: 💾 最大化磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    - name: 📥 克隆 LEDE 源码
      run: |
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
        echo "COMPILE_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: ⚙️ 应用配置并修复冲突
      run: |
        cd openwrt
        
        # 显示当前目录结构
        echo "📁 当前目录结构:"
        ls -la ../
        
        # 复制配置文件
        CONFIG_FILE="../config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        echo "📋 应用配置: $CONFIG_FILE"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 错误：找不到配置文件"
          echo "📁 可用配置文件:"
          ls -la ../config/ || echo "config 目录不存在"
          exit 1
        fi
        
        cp -f "$CONFIG_FILE" .config
        
        # 🔧 强制修复冲突包
        echo "🔧 修复配置冲突..."
        sed -i 's/^CONFIG_PACKAGE_vsftpd=y/# CONFIG_PACKAGE_vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-app-vsftpd=y/# CONFIG_PACKAGE_luci-app-vsftpd is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn=y/# CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn is not set/' .config
        sed -i 's/^CONFIG_PACKAGE_firewall=y/# CONFIG_PACKAGE_firewall is not set/' .config
        
        # 确保 vsftpd-alt 和 firewall4 启用
        if ! grep -q "CONFIG_PACKAGE_vsftpd-alt=y" .config; then
          echo "CONFIG_PACKAGE_vsftpd-alt=y" >> .config
        fi
        if ! grep -q "CONFIG_PACKAGE_firewall4=y" .config; then
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
        fi
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 生成配置
        make defconfig
        
        echo "✅ 配置应用完成"

    - name: 📥 下载软件包
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: 🏗️ 编译固件
      id: compile
      run: |
        cd openwrt
        mkdir -p ../output
        
        START_TIME=$(date +%s)
        
        # 编译
        if make -j$(nproc) V=s 2>&1 | tee ../output/build.log; then
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "✅ 编译成功！耗时: $((DURATION/3600))h $((DURATION%3600/60))m $((DURATION%60))s"
          
          # 查找固件
          FIRMWARE=$(find bin/targets -name "*sysupgrade.bin" -type f | head -1)
          if [ -n "$FIRMWARE" ]; then
            cp "$FIRMWARE" ../output/
            echo "FIRMWARE_NAME=$(basename $FIRMWARE)" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到固件"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "❌ 编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: 🚀 发布固件
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        tag: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          output/*.bin
          output/build.log
        body: |
          ### 📒 固件信息
          
          | 项目 | 值 |
          |------|-----|
          | 💻 设备 | ${{ env.DEVICE }} |
          | 📦 配置 | ${{ env.CONFIG_VERSION }} |
          | 📂 源码 | coolsnowwolf/lede |
          | 🌳 分支 | ${{ env.REPO_BRANCH }} |
          | 🕐 编译时间 | ${{ env.COMPILE_DATE }} |
          
          ### 🔧 默认配置
          - 🌐 管理地址: `192.168.1.1`
          - 👤 用户名: `root`
          - 🔒 密码: **首次登录强制修改**
          - 📶 WiFi: 前缀 `Redmi_` 或 `TP-LINK_` + MAC_2G/5G
          - 🎨 主题: Argon

    - name: 📝 上传日志（失败时）
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ env.DEVICE }}
        path: |
          output/build.log
          openwrt/.config
